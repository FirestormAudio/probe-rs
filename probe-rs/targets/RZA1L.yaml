      - start: 0x0C000000
        end: 0x0FFFFFFF
    memory_map:
      - !Nvm
        name: NOR_CS0
        range:
          start: 0x00000000
          end: 0x03FFFFFF
        cores:
          - core0
      - !Ram
        name: InternalSRAM
        range:
          start: 0x20000000
          end: 0x202FFFFF
        cores:
          - core0
      - !Ram
        name: InternalSRAM_NonCached
        range:
